name = "edgetier"
main = "src/worker/index.ts"
compatibility_date = "2026-06-09"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = "dist/client"
binding = "ASSETS"
not_found_handling = "single-page-application"
# Route every request through the Worker first so the session/auth gate in
# src/worker/index.ts runs before any dashboard asset is served. Without this,
# the Asset Worker would serve dist/client files (including the SPA shell) to
# unauthenticated clients, bypassing verifySessionRequest.
run_worker_first = true

[[durable_objects.bindings]]
name = "RELAY_ROOM"
class_name = "RelayRoom"

[[durable_objects.bindings]]
name = "DIRECTORY"
class_name = "Directory"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["RelayRoom", "Directory"]
